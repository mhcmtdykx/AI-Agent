# 文本总结技能配置
name: summarizer
description: 总结长文本
category: data
version: "1.0.0"
author: system

parameters:
  - name: text
    type: string
    description: 要总结的文本
    required: true
  - name: max_length
    type: integer
    description: 最大长度
    required: false
    default: 100

implementation:
  type: script
  language: python
  code: |
    def execute(text, max_length=100):
        if len(text) <= max_length:
            return text
        return text[:max_length] + "..."
