# JSON格式化技能配置
name: json_formatter
description: 格式化JSON字符串
category: code
version: "1.0.0"
author: system

parameters:
  - name: json_str
    type: string
    description: JSON字符串
    required: true

implementation:
  type: script
  language: python
  code: |
    import json
    
    def execute(json_str):
        try:
            data = json.loads(json_str)
            return json.dumps(data, indent=2, ensure_ascii=False)
        except Exception as e:
            return f"JSON格式错误: {str(e)}"
