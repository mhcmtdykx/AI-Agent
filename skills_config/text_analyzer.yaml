# 文本分析技能配置
name: text_analyzer
description: 分析文本信息（字符数、单词数、行数等）
category: data
version: "1.0.0"
author: system

parameters:
  - name: text
    type: string
    description: 要分析的文本
    required: true

implementation:
  type: script
  language: python
  code: |
    def execute(text):
        words = text.split()
        chinese_chars = sum(1 for c in text if '\u4e00' <= c <= '\u9fff')
        return {
            "字符数": len(text),
            "单词数": len(words),
            "中文字符数": chinese_chars,
            "行数": text.count('\n') + 1
        }
