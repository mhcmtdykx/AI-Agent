# 计算器技能配置
name: calculator
description: 计算数学表达式
category: data
version: "1.0.0"
author: system

parameters:
  - name: expression
    type: string
    description: 数学表达式，如 2+3*4 或 sqrt(16)
    required: true

# 实现方式: script / api / llm
implementation:
  type: script
  language: python
  code: |
    import math
    
    def execute(expression):
        safe_dict = {
            "__builtins__": {},
            "abs": abs, "round": round,
            "min": min, "max": max,
            "sqrt": math.sqrt,
            "sin": math.sin, "cos": math.cos,
            "pi": math.pi, "e": math.e
        }
        result = eval(expression, safe_dict)
        return str(result)
