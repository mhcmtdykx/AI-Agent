# 天气查询技能配置
name: weather
description: 查询指定城市的实时天气信息
category: search
version: "1.0.0"
author: system

parameters:
  - name: city
    type: string
    description: 城市名称（如：北京、上海、Tokyo、Beijing）
    required: true

implementation:
  type: script
  language: python
  code: |
    import requests
    import json
    
    def execute(city):
        try:
            # 城市名映射
            city_map = {
                "北京": "Beijing", "上海": "Shanghai", "广州": "Guangzhou",
                "深圳": "Shenzhen", "杭州": "Hangzhou", "成都": "Chengdu",
                "武汉": "Wuhan", "南京": "Nanjing", "重庆": "Chongqing",
                "西安": "Xian"
            }
            city_en = city_map.get(city, city)
            
            url = "https://wttr.in/" + city_en + "?format=j1"
            headers = {"User-Agent": "curl/7.64.1", "Accept": "application/json"}
            response = requests.get(url, headers=headers, timeout=10)
            
            if response.status_code != 200:
                return "查询失败，状态码: " + str(response.status_code)
            
            data = response.json()
            current = data.get("current_condition", [{}])[0]
            
            # 获取天气描述
            weather_desc = current.get("weatherDesc", [{}])[0].get("value", "未知")
            
            # 获取最近的天气预报
            forecast = data.get("weather", [{}])[0] if data.get("weather") else {}
            max_temp = forecast.get("maxtempC", "N/A")
            min_temp = forecast.get("mintempC", "N/A")
            
            result = city + "实时天气信息：\n"
            result += "  天气状况: " + weather_desc + "\n"
            result += "  当前温度: " + current.get("temp_C", "N/A") + "°C\n"
            result += "  体感温度: " + current.get("FeelsLikeC", "N/A") + "°C\n"
            result += "  今日温度: " + min_temp + "°C ~ " + max_temp + "°C\n"
            result += "  湿度: " + current.get("humidity", "N/A") + "%\n"
            result += "  风速: " + current.get("windspeedKmph", "N/A") + " km/h\n"
            result += "  风向: " + current.get("winddir16Point", "N/A") + "\n"
            result += "  能见度: " + current.get("visibility", "N/A") + " km\n"
            result += "  气压: " + current.get("pressure", "N/A") + " mb\n"
            result += "  观测时间: " + current.get("observation_time", "N/A")
            
            return result
        except Exception as e:
            return "查询天气失败: " + str(e)
