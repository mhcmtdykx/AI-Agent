name: diagram_generator
description: 生成论文框架图、流程图、思维导图
category: creative
version: "1.0.0"

parameters:
  - name: title
    type: string
    description: 图表标题
    required: true
  - name: content
    type: string
    description: 论文内容或大纲描述
    required: true
  - name: diagram_type
    type: string
    description: "图表类型: flowchart(流程图), mindmap(思维导图), sequence(时序图)"
    required: false
    default: "flowchart"

implementation:
  type: script
  language: python
  code: |
    def execute(title, content, diagram_type="flowchart"):
        """生成论文框架图"""
        
        # 分析内容，提取结构
        sections = analyze_content(content)
        
        # 根据图表类型生成Mermaid代码
        if diagram_type == "mindmap":
            mermaid_code = generate_mindmap(title, sections)
        elif diagram_type == "sequence":
            mermaid_code = generate_sequence(title, sections)
        else:  # flowchart
            mermaid_code = generate_flowchart(title, sections)
        
        return {
            "title": title,
            "diagram_type": diagram_type,
            "mermaid_code": mermaid_code,
            "sections": sections
        }
    
    def analyze_content(content):
        """分析内容，提取章节结构"""
        sections = []
        lines = content.strip().split('\n')
        
        current_section = None
        current_subsections = []
        
        for line in lines:
            line = line.strip()
            if not line:
                continue
            
            # 检测标题级别
            if line.startswith('# ') or line.startswith('第') or line.startswith('Chapter'):
                if current_section:
                    sections.append({
                        "title": current_section,
                        "subsections": current_subsections
                    })
                current_section = line
                current_subsections = []
            elif line.startswith('## ') or line.startswith('1.') or line.startswith('2.') or line.startswith('3.'):
                current_subsections.append(line)
            elif line.startswith('- ') or line.startswith('* '):
                current_subsections.append(line)
        
        # 添加最后一个section
        if current_section:
            sections.append({
                "title": current_section,
                "subsections": current_subsections
            })
        
        # 如果没有检测到结构，创建默认结构
        if not sections:
            sections = [
                {"title": "引言", "subsections": ["研究背景", "研究目的", "研究意义"]},
                {"title": "文献综述", "subsections": ["国内外研究现状", "研究理论基础"]},
                {"title": "研究方法", "subsections": ["研究设计", "数据收集", "分析方法"]},
                {"title": "研究结果", "subsections": ["数据分析", "结果展示"]},
                {"title": "讨论", "subsections": ["结果讨论", "研究局限", "未来展望"]},
                {"title": "结论", "subsections": ["主要发现", "研究贡献"]}
            ]
        
        return sections
    
    def generate_flowchart(title, sections):
        """生成流程图"""
        mermaid = f"graph TD\n"
        mermaid += f"    Title[\"{title}\"]\n\n"
        
        for i, section in enumerate(sections):
            section_id = f"S{i}"
            section_title = section['title'].replace('# ', '').replace('"', "'")
            mermaid += f"    {section_id}[\"{section_title}\"]\n"
            
            for j, sub in enumerate(section.get('subsections', [])):
                sub_id = f"S{i}_{j}"
                sub_title = sub.replace('- ', '').replace('* ', '').replace('"', "'")
                mermaid += f"    {sub_id}[\"{sub_title}\"]\n"
                mermaid += f"    {section_id} --> {sub_id}\n"
            
            if i > 0:
                mermaid += f"    S{i-1} --> {section_id}\n"
            else:
                mermaid += f"    Title --> {section_id}\n"
        
        mermaid += "\n    style Title fill:#e1f5fe\n"
        mermaid += "    style S0 fill:#f3e5f5\n"
        mermaid += "    style S1 fill:#e8f5e8\n"
        mermaid += "    style S2 fill:#fff3e0\n"
        mermaid += "    style S3 fill:#fce4ec\n"
        mermaid += "    style S4 fill:#f3e5f5\n"
        mermaid += "    style S5 fill:#e0f2f1\n"
        
        return mermaid
    
    def generate_mindmap(title, sections):
        """生成思维导图"""
        mermaid = f"mindmap\n"
        mermaid += f"  {title}\n"
        
        for section in sections:
            section_title = section['title'].replace('# ', '').replace('"', "'")
            mermaid += f"    {section_title}\n"
            
            for sub in section.get('subsections', []):
                sub_title = sub.replace('- ', '').replace('* ', '').replace('"', "'")
                mermaid += f"      {sub_title}\n"
        
        return mermaid
    
    def generate_sequence(title, sections):
        """生成时序图"""
        mermaid = f"sequenceDiagram\n"
        mermaid += f"    title {title}\n"
        
        participants = ["研究者", "数据", "分析", "结论"]
        for p in participants:
            mermaid += f"    participant {p}\n"
        
        mermaid += "\n"
        mermaid += "    研究者->>数据: 收集数据\n"
        mermaid += "    数据-->>研究者: 返回数据\n"
        mermaid += "    研究者->>分析: 数据分析\n"
        mermaid += "    分析-->>结论: 分析结果\n"
        mermaid += "    结论-->>研究者: 研究结论\n"
        
        return mermaid
